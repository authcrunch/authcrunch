name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v3
        with:
          go-version: "~1.25"
          check-latest: true
          cache: true
      - name: Generate dependency changelog
        shell: bash
        run: |
          changelog_file="${RUNNER_TEMP}/dependency-changelog.md"
          assets/scripts/generate_dependency_changelog.sh > "${changelog_file}"
          {
            echo "AUTHCRUNCH_DEPENDENCY_CHANGELOG<<AUTHCRUNCH_DEPENDENCY_CHANGELOG_EOF"
            cat "${changelog_file}"
            echo "AUTHCRUNCH_DEPENDENCY_CHANGELOG_EOF"
          } >> "${GITHUB_ENV}"
      - uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH: /home/runner/go
